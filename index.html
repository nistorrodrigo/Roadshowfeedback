<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roadshow Brasil — Feedback | Latin Securities</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f5f5f3; color: #1a1a18; min-height: 100vh;
  padding: 2rem 1rem;
}
.page { max-width: 760px; margin: 0 auto; }

.header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1.75rem; flex-wrap: wrap; gap: 12px;
}
.logo { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
.logo span { color: #185FA5; }
.subtitle { font-size: 13px; color: #888780; margin-top: 2px; }

.day-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
.day-tab {
  padding: 6px 14px; border-radius: 8px;
  border: 0.5px solid #ccc;
  background: #fff;
  color: #5f5e5a;
  cursor: pointer; font-size: 13px; font-weight: 500;
  transition: all 0.15s;
}
.day-tab.active { border-color: #888; color: #1a1a18; background: #fff; font-weight: 600; }
